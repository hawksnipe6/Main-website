<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Nocturnal — Design Intelligence. Coming Soon." />
  <title>Nocturnal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Host+Grotesk:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'Host Grotesk', sans-serif;
      -webkit-font-smoothing: antialiased;
      background: #0a0a0a;
    }

    /* ── VIDEO ─────────────────────────────── */
    .bg-video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      z-index: 0;
    }

    /* ── CONTENT LAYER ─────────────────────── */
    .stage {
      position: fixed;
      inset: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: clamp(32px, 7vh, 72px);
      gap: clamp(16px, 2.5vh, 28px);
    }

    /* ── TOP TEXT ──────────────────────────── */
    .top-text {
      font-size: clamp(12px, 1.4vw, 16px);
      font-weight: 400;
      color: rgba(255,255,255,0.82);
      letter-spacing: 0.02em;
      text-align: center;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.3s forwards;
    }

    /* ── CTA BUTTON ────────────────────────── */
    .cta-btn {
      font-family: 'Host Grotesk', sans-serif;
      font-size: clamp(11px, 1.2vw, 14px);
      font-weight: 500;
      color: rgba(255,255,255,0.75);
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 999px;
      padding: clamp(9px, 1.2vh, 13px) clamp(22px, 2.5vw, 36px);
      cursor: pointer;
      letter-spacing: 0.03em;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.5s forwards;
      white-space: nowrap;
    }
    .cta-btn:hover {
      background: rgba(255,255,255,0.14);
      border-color: rgba(255,255,255,0.35);
      color: #ffffff;
    }

    /* ── MODAL BACKDROP ────────────────────── */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 10;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-backdrop.open {
      display: flex;
    }

    /* ── MODAL ─────────────────────────────── */
    .modal {
      background: rgba(15,15,15,0.92);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: clamp(32px, 5vw, 52px) clamp(28px, 4vw, 48px);
      width: 100%;
      max-width: 420px;
      position: relative;
      animation: scaleIn 0.3s cubic-bezier(0.16,1,0.3,1);
    }

    .modal-close {
      position: absolute;
      top: 16px; right: 20px;
      background: none;
      border: none;
      color: rgba(255,255,255,0.4);
      font-size: 18px;
      cursor: pointer;
      font-family: inherit;
      line-height: 1;
      transition: color 0.2s;
    }
    .modal-close:hover { color: rgba(255,255,255,0.9); }

    .modal-label {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #E8612A;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .modal-label::before {
      content: '';
      display: block;
      width: 18px;
      height: 1px;
      background: #E8612A;
    }

    .modal-title {
      font-size: clamp(20px, 2.5vw, 26px);
      font-weight: 700;
      color: #F5F4F0;
      line-height: 1.15;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }

    .modal-sub {
      font-size: 13px;
      color: rgba(255,255,255,0.45);
      line-height: 1.6;
      margin-bottom: 28px;
    }

    /* Fields */
    .field {
      margin-bottom: 14px;
    }

    .field input {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      padding: 13px 16px;
      font-family: 'Host Grotesk', sans-serif;
      font-size: 14px;
      color: #F5F4F0;
      outline: none;
      transition: border-color 0.2s;
    }
    .field input::placeholder { color: rgba(255,255,255,0.28); }
    .field input:focus { border-color: rgba(255,255,255,0.28); }

    .submit-btn {
      width: 100%;
      margin-top: 6px;
      background: #E8612A;
      color: #F5F4F0;
      font-family: 'Host Grotesk', sans-serif;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      padding: 14px;
      cursor: pointer;
      transition: opacity 0.2s;
      letter-spacing: 0.01em;
    }
    .submit-btn:hover { opacity: 0.88; }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Success state */
    .success {
      display: none;
      text-align: center;
      padding: 16px 0 8px;
    }
    .success-icon {
      font-size: 32px;
      margin-bottom: 14px;
    }
    .success-title {
      font-size: 20px;
      font-weight: 700;
      color: #F5F4F0;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }
    .success-sub {
      font-size: 13px;
      color: rgba(255,255,255,0.45);
      line-height: 1.6;
    }

    /* Error */
    .error-msg {
      font-size: 12px;
      color: #E8612A;
      margin-top: 10px;
      display: none;
      text-align: center;
    }

    /* ── KEYFRAMES ─────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.96) translateY(12px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* ── MOBILE ────────────────────────────── */
    @media (max-width: 480px) {
      .modal { border-radius: 10px; }
    }
  </style>
</head>
<body>

  <!-- Looping background video -->
  <video
    class="bg-video"
    src="bg.mp4"
    autoplay
    loop
    muted
    playsinline
    preload="auto"
  ></video>

  <!-- Content -->
  <div class="stage">
    <span class="top-text">Design Intelligence coming soon</span>

    <button class="cta-btn" id="openModal">Join the Waitlist</button>
  </div>

  <!-- Waitlist Modal -->
  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">

      <button class="modal-close" id="closeModal" aria-label="Close">✕</button>

      <!-- Form view -->
      <div id="formView">
        <p class="modal-label">Waitlist</p>
        <h2 class="modal-title" id="modalTitle">Be first to know.</h2>
        <p class="modal-sub">Nocturnal is almost ready. Leave your details and we'll reach out when the doors open.</p>

        <form id="waitlistForm">
          <div class="field">
            <input
              type="text"
              name="name"
              placeholder="Your name"
              required
              autocomplete="given-name"
            />
          </div>
          <div class="field">
            <input
              type="email"
              name="email"
              placeholder="Your email"
              required
              autocomplete="email"
            />
          </div>
          <button type="submit" class="submit-btn" id="submitBtn">
            Join the Waitlist
          </button>
          <p class="error-msg" id="errorMsg">Something went wrong. Please try again.</p>
        </form>
      </div>

      <!-- Success view -->
      <div class="success" id="successView">
        <div class="success-icon">✦</div>
        <p class="success-title">You're on the list.</p>
        <p class="success-sub">We'll be in touch when Nocturnal launches. Keep an eye on your inbox.</p>
      </div>

    </div>
  </div>

  <script>
    const openBtn      = document.getElementById('openModal');
    const closeBtn     = document.getElementById('closeModal');
    const backdrop     = document.getElementById('modalBackdrop');
    const form         = document.getElementById('waitlistForm');
    const submitBtn    = document.getElementById('submitBtn');
    const formView     = document.getElementById('formView');
    const successView  = document.getElementById('successView');
    const errorMsg     = document.getElementById('errorMsg');

    const open  = () => backdrop.classList.add('open');
    const close = () => backdrop.classList.remove('open');

    openBtn.addEventListener('click', open);
    closeBtn.addEventListener('click', close);
    backdrop.addEventListener('click', e => { if (e.target === backdrop) close(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') close(); });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      submitBtn.disabled = true;
      submitBtn.textContent = 'Sending…';
      errorMsg.style.display = 'none';

      const data = new FormData(form);

      try {
        const res = await fetch('https://formspree.io/f/mlgzpznq', {
          method: 'POST',
          body: data,
          headers: { 'Accept': 'application/json' },
        });

        if (res.ok) {
          formView.style.display = 'none';
          successView.style.display = 'block';
        } else {
          throw new Error('bad response');
        }
      } catch {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Join the Waitlist';
        errorMsg.style.display = 'block';
      }
    });
  </script>

</body>
</html>
