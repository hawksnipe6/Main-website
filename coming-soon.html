<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nocturnal — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Host+Grotesk:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #F5F4F0;
      font-family: 'Host Grotesk', sans-serif;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── STAGE ─────────────────────────────── */
    .stage {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(16px, 3vh, 32px);
    }

    /* ── "Nocturnal" top label ──────────────── */
    .label-top {
      font-size: clamp(11px, 1.2vw, 14px);
      font-weight: 500;
      letter-spacing: 0.04em;
      color: #888888;
      opacity: 0;
      animation: fadeIn 0.6s ease 0.3s forwards;
    }

    /* ── BLURRED HEADLINE ───────────────────── */
    .headline-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .headline {
      font-size: clamp(72px, 14vw, 220px);
      font-weight: 800;
      line-height: 0.88;
      letter-spacing: -0.04em;
      color: #E8612A;
      text-align: center;
      filter: blur(clamp(8px, 1.5vw, 18px));
      opacity: 0;
      animation: blurReveal 1s cubic-bezier(0.16,1,0.3,1) 0.5s forwards;
      user-select: none;
    }

    /* ── SPINNER overlay centred on headline ── */
    .spinner-wrap {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      opacity: 0;
      animation: fadeIn 0.4s ease 1s forwards;
    }

    .spinner {
      width: clamp(40px, 5vw, 72px);
      height: clamp(40px, 5vw, 72px);
      position: relative;
    }

    .spinner-tick {
      position: absolute;
      top: 0; left: 50%;
      width: 2px;
      height: 28%;
      margin-left: -1px;
      transform-origin: bottom center;
      border-radius: 2px;
    }

    /* Generate 12 ticks */
    .spinner-tick:nth-child(1)  { transform: translateY(-100%) rotate(0deg);   background: rgba(13,13,13,1);    animation: tickFade 1.2s linear 0.0s infinite; }
    .spinner-tick:nth-child(2)  { transform: translateY(-100%) rotate(30deg);  background: rgba(13,13,13,0.9);  animation: tickFade 1.2s linear 0.1s infinite; }
    .spinner-tick:nth-child(3)  { transform: translateY(-100%) rotate(60deg);  background: rgba(13,13,13,0.8);  animation: tickFade 1.2s linear 0.2s infinite; }
    .spinner-tick:nth-child(4)  { transform: translateY(-100%) rotate(90deg);  background: rgba(13,13,13,0.7);  animation: tickFade 1.2s linear 0.3s infinite; }
    .spinner-tick:nth-child(5)  { transform: translateY(-100%) rotate(120deg); background: rgba(13,13,13,0.6);  animation: tickFade 1.2s linear 0.4s infinite; }
    .spinner-tick:nth-child(6)  { transform: translateY(-100%) rotate(150deg); background: rgba(13,13,13,0.5);  animation: tickFade 1.2s linear 0.5s infinite; }
    .spinner-tick:nth-child(7)  { transform: translateY(-100%) rotate(180deg); background: rgba(13,13,13,0.4);  animation: tickFade 1.2s linear 0.6s infinite; }
    .spinner-tick:nth-child(8)  { transform: translateY(-100%) rotate(210deg); background: rgba(13,13,13,0.35); animation: tickFade 1.2s linear 0.7s infinite; }
    .spinner-tick:nth-child(9)  { transform: translateY(-100%) rotate(240deg); background: rgba(13,13,13,0.28); animation: tickFade 1.2s linear 0.8s infinite; }
    .spinner-tick:nth-child(10) { transform: translateY(-100%) rotate(270deg); background: rgba(13,13,13,0.2);  animation: tickFade 1.2s linear 0.9s infinite; }
    .spinner-tick:nth-child(11) { transform: translateY(-100%) rotate(300deg); background: rgba(13,13,13,0.14); animation: tickFade 1.2s linear 1.0s infinite; }
    .spinner-tick:nth-child(12) { transform: translateY(-100%) rotate(330deg); background: rgba(13,13,13,0.08); animation: tickFade 1.2s linear 1.1s infinite; }

    /* ── KEYFRAMES ─────────────────────────── */
    @keyframes blurReveal {
      from { opacity: 0; filter: blur(clamp(24px, 4vw, 48px)); }
      to   { opacity: 1; filter: blur(clamp(8px, 1.5vw, 18px)); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes tickFade {
      0%   { opacity: 1; }
      100% { opacity: 0.08; }
    }

  </style>
</head>
<body>
  <div class="stage">

    <span class="label-top">Nocturnal</span>

    <div class="headline-wrap">
      <div class="headline">Design<br/>Intelligence</div>

      <div class="spinner-wrap">
        <div class="spinner">
          <div class="spinner-tick"></div>
          <div class="spinner-tick"></div>
          <div class="spinner-tick"></div>
          <div class="spinner-tick"></div>
          <div class="spinner-tick"></div>
          <div class="spinner-tick"></div>
          <div class="spinner-tick"></div>
          <div class="spinner-tick"></div>
          <div class="spinner-tick"></div>
          <div class="spinner-tick"></div>
          <div class="spinner-tick"></div>
          <div class="spinner-tick"></div>
        </div>
      </div>
    </div>

  </div>
</body>
</html>
